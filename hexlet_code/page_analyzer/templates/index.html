<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Анализатор страницы</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .glass-effect {
      background: rgba(248, 250, 252, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(121, 146, 182, 0.2);
    }
    .navbar-dark-custom {
      background: rgba(30, 41, 59, 0.95) !important;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body class="bg-light">
  <!-- Шапка навигации -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-dark-custom shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 text-white" href="/">Анализатор страницы</a>
    </div>
  </nav>


  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">
        <!-- Основной блок с голубым стеклянным эффектом -->
        <div class="glass-effect rounded-4 p-5 shadow-lg">
          <div class="text-center mb-5">
            <!-- ЧЁРНЫЙ заголовок -->
            <h1 class="display-5 fw-bold mb-4 text-dark">
              Анализатор страницы
            </h1>
            <p class="lead text-muted">
              Введите адрес сайта для получения SEO-отчёта
            </p>
          </div>
          
          <!-- Форма -->
    <form method="POST" action="/urls">
    <div class="input-group">
        <span class="input-group-text bg-white border-end-0 px-3">https://</span>
        <input 
        type="text" 
        class="form-control form-control-lg border-start-0 px-4" 
        name="url"
        value="{{ url if url else 'example.com' }}"
        placeholder="example.com"
        required
        >
        <button class="btn btn-primary btn-lg px-5" type="submit">
        Проверить
        </button>
    </div>
    </form>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
