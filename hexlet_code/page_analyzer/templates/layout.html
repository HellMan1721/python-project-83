<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .glass-effect { background: rgba(248, 250, 252, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(148, 163, 184, 0.2); }
    .navbar-dark-custom { background: rgba(30, 41, 59, 0.95) !important; backdrop-filter: blur(10px); }
  </style>
  <title>{% block title %}Анализатор страницы{% endblock %}</title>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark navbar-dark-custom shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4 text-white" href="{{ url_for('index') }}">Анализатор страницы</a>
      <div class="navbar-nav">
        <a class="nav-link text-white" href="{{ url_for('urls_list') }}">Список адресов</a>
      </div>
    </div>
  </nav>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show container mt-3" style="max-width: 600px;">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
