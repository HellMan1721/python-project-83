<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">

  <title>Анализатор страницы</title>
</head>

<body>
    <style>
        body, head, footer {font-family: Arial, sans-serif}
    </style>
        <nav class="navbar navbar-dark bg-dark">
            <a class="navbar-brand" href="/">Анализатор страниц</a>
            <a class="nav-link text-light" href="/urls">Сайты</a>
        </nav>

        <main class="container-lg mt-3">

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} mt-3">
                    {{ message }}
                    </div>
                {% endfor %}
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}

        </main>

        <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
